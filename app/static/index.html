<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Relic Ring Protocol</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17202a;
      --muted: #5d6673;
      --line: #ccd4df;
      --panel: #f7f9fb;
      --paper: #ffffff;
      --accent: #0f766e;
      --route: #d97706;
      --danger: #c2410c;
      --blue: #2563eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: #eef2f6;
    }
    header {
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 20px;
      background: var(--paper);
      border-bottom: 1px solid var(--line);
    }
    h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0;
    }
    main {
      display: grid;
      grid-template-columns: minmax(320px, 1fr) 420px;
      min-height: calc(100vh - 57px);
    }
    .stage {
      position: relative;
      min-height: 520px;
      background: #fbfcfe;
      overflow: hidden;
    }
    svg {
      width: 100%;
      height: 100%;
      min-height: calc(100vh - 57px);
      display: block;
    }
    aside {
      background: var(--paper);
      border-left: 1px solid var(--line);
      padding: 16px;
      overflow: auto;
    }
    section {
      padding: 14px 0;
      border-bottom: 1px solid var(--line);
    }
    section:first-child { padding-top: 0; }
    section:last-child { border-bottom: 0; }
    h2 {
      margin: 0 0 10px;
      font-size: 13px;
      text-transform: uppercase;
      color: var(--muted);
      letter-spacing: 0.06em;
    }
    label {
      display: grid;
      gap: 5px;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 10px;
    }
    select, input {
      width: 100%;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      background: #fff;
      color: var(--ink);
      font: inherit;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    button {
      min-height: 36px;
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 8px 11px;
      background: var(--accent);
      color: #fff;
      font-weight: 650;
      cursor: pointer;
    }
    button.secondary {
      background: #fff;
      color: var(--ink);
      border-color: var(--line);
    }
    button.danger { background: var(--danger); }
    .status {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 4px 8px;
      border-radius: 6px;
      background: #e8f5f3;
      color: #0f5f59;
      font-size: 12px;
      font-weight: 700;
    }
    .metric {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      padding: 6px 0;
      font-size: 13px;
      border-bottom: 1px dashed #dde3ea;
    }
    .metric:last-child { border-bottom: 0; }
    .metric span:first-child { color: var(--muted); }
    .hop {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 10px;
      background: var(--panel);
      font-size: 12px;
    }
    .hop strong {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
    }
    code {
      display: block;
      max-height: 72px;
      overflow: auto;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      background: #fff;
      border: 1px solid #e0e6ee;
      border-radius: 6px;
      padding: 6px;
      margin-top: 6px;
      color: #1f2937;
    }
    .planet-label {
      font-size: 12px;
      font-weight: 700;
      paint-order: stroke;
      stroke: #fff;
      stroke-width: 4px;
      stroke-linejoin: round;
    }
    .link {
      stroke: #aab5c2;
      stroke-width: 2;
    }
    .link.failed {
      stroke: #7a8088;
      stroke-dasharray: 7 6;
      opacity: 0.55;
    }
    .link.route {
      stroke: var(--route);
      stroke-width: 5;
      opacity: 0.9;
    }
    .planet {
      fill: #dbeafe;
      stroke: var(--blue);
      stroke-width: 2;
    }
    .planet.failed {
      fill: #fee2e2;
      stroke: var(--danger);
    }
    .tower {
      fill: #111827;
      stroke: #fff;
      stroke-width: 1;
    }
    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; }
      aside { border-left: 0; border-top: 1px solid var(--line); }
      svg { min-height: 520px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Relic Ring Protocol - Zeta-26 Router</h1>
    <span class="status" id="status">Loading</span>
  </header>
  <main>
    <div class="stage">
      <svg id="map" role="img" aria-label="Universe graph"></svg>
    </div>
    <aside>
      <section>
        <h2>Packet</h2>
        <div class="row">
          <label>Origin<select id="origin"></select></label>
          <label>Destination<select id="destination"></select></label>
        </div>
        <label>Payload<input id="payload" value="Hello world"></label>
        <div class="actions">
          <button id="send">Send Packet</button>
          <button class="secondary" id="routeOnly">Route Only</button>
        </div>
      </section>
      <section>
        <h2>Failures</h2>
        <div class="row">
          <label>Node<select id="failNode"></select></label>
          <label>Link<select id="failLink"></select></label>
        </div>
        <div class="actions">
          <button class="danger" id="killNode">Kill Node</button>
          <button class="danger" id="killLink">Kill Link</button>
          <button class="secondary" id="resetFailures">Reset</button>
        </div>
      </section>
      <section>
        <h2>Result</h2>
        <div id="summary"></div>
      </section>
      <section>
        <h2>Hop Log</h2>
        <div id="hops"></div>
      </section>
    </aside>
  </main>
